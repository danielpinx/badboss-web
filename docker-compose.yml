# BadBoss Docker Compose: app + Redis
services:
  # Next.js 애플리케이션
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # M-8: Redis 인증 패스워드 포함 URL (REDIS_PASSWORD 환경변수 필수)
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD 환경변수를 설정하세요}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Redis 데이터 스토어
  redis:
    image: redis:7-alpine
    # M-8: Redis 인증 설정 (REDIS_PASSWORD 환경변수 필수)
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD 환경변수를 설정하세요}
    # M-6: 외부 포트 노출 제거 (Docker 내부 네트워크로만 통신)
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
